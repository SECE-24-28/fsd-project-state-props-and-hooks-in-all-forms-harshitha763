<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionCart - Premium Fashion Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .landing-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 20px;
            text-align: center;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .landing-hero h1 {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            animation: slideUp 0.8s ease-out;
        }

        .landing-hero p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: slideUp 0.8s ease-out 0.2s backwards;
        }

        .landing-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 0.8s ease-out 0.4s backwards;
        }

        .landing-buttons .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            transition: all 0.3s ease;
        }

        .landing-buttons .btn-light {
            background: white;
            color: #667eea;
        }

        .landing-buttons .btn-light:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .landing-buttons .btn-outline-light {
            border: 2px solid white;
            color: white;
        }

        .landing-buttons .btn-outline-light:hover {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- Simple Landing Section -->
    <div class="landing-hero">
        <h1>Welcome to FashionCart</h1>
        <p>Discover Premium Fashion Collections</p>
        <div class="landing-buttons">
            <a href="login.html" class="btn btn-light">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
            <a href="signup.html" class="btn btn-outline-light">
                <i class="fas fa-user-plus"></i> Sign Up
            </a>
        </div>
    </div>

    <!-- Features -->
    <div class="container py-5">
        <div class="row text-center">
            <div class="col-md-4 mb-4">
                <div style="padding: 30px;">
                    <i class="fas fa-bolt" style="font-size: 3rem; color: #667eea; margin-bottom: 15px;"></i>
                    <h5>Fast & Reliable</h5>
                    <p>Quick delivery to your doorstep</p>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div style="padding: 30px;">
                    <i class="fas fa-shield-alt" style="font-size: 3rem; color: #667eea; margin-bottom: 15px;"></i>
                    <h5>Secure Shopping</h5>
                    <p>100% safe and secure transactions</p>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div style="padding: 30px;">
                    <i class="fas fa-star" style="font-size: 3rem; color: #667eea; margin-bottom: 15px;"></i>
                    <h5>Premium Quality</h5>
                    <p>Authentic products from top brands</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
