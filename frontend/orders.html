<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - FashionCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .order-card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); margin-bottom:20px; overflow:hidden; }
        .order-header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:15px 20px; }
        .status-badge { padding:4px 12px; border-radius:20px; font-size:.8rem; font-weight:600; }
        .status-Confirmed { background:#d1fae5; color:#065f46; }
        .status-Shipped    { background:#dbeafe; color:#1e40af; }
        .status-Delivered  { background:#dcfce7; color:#166534; }
        .status-Cancelled  { background:#fee2e2; color:#991b1b; }
        .order-img { width:56px; height:56px; object-fit:cover; border-radius:8px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top px-4">
    <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-shopping-bag"></i> FashionCart</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <div class="ms-auto d-flex gap-2 align-items-center flex-wrap">
            <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="categories.html" class="btn btn-outline-light btn-sm">Categories</a>
            <button class="btn btn-warning btn-sm position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="position-absolute top-0 start-100 translate-middle badge bg-danger" id="cartCount">0</span>
            </button>
            <div class="nav-item dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle"></i> <span id="userDisplay">User</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="wishlist.html"><i class="fas fa-heart me-2"></i>Wishlist</a></li>
                    <li><a class="dropdown-item" href="orders.html"><i class="fas fa-box me-2"></i>Orders</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="fas fa-box me-2 text-primary"></i>My Orders</h2>
        <a href="index.html" class="btn btn-outline-dark btn-sm"><i class="fas fa-shopping-bag me-1"></i>Shop More</a>
    </div>

    <div id="ordersContainer"></div>
</div>

<!-- Cart Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <div id="cartItems" class="flex-grow-1"></div>
        <div class="border-top pt-3 mt-auto">
            <div class="d-flex justify-content-between fw-bold fs-5 mb-3"><span>Total</span><span class="text-primary">₹<span id="cartTotal">0</span></span></div>
            <a href="checkout.html" class="btn btn-success w-100 fw-bold">Checkout</a>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center text-white-50"><p class="mb-0">&copy; 2024 FashionCart. All rights reserved.</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    if (!isLoggedIn()) { window.location.href = 'login.html'; }

    function renderOrders() {
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        const container = document.getElementById('ordersContainer');
        if (!orders.length) {
            container.innerHTML = `<div class="text-center py-5"><i class="fas fa-box-open fa-4x text-muted mb-3"></i><h5 class="text-muted">No orders yet</h5><a href="index.html" class="btn btn-primary mt-3">Start Shopping</a></div>`;
            return;
        }
        container.innerHTML = orders.map(order => `
            <div class="order-card card">
                <div class="order-header d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <div class="fw-bold">Order #${order.id}</div>
                        <div class="small opacity-75">${order.date}</div>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <span class="status-badge status-${order.status}">${order.status}</span>
                        <span class="fw-bold fs-5">₹${order.total.toLocaleString('en-IN')}</span>
                    </div>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        ${order.items.map(i => `
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <img src="${i.image}" class="order-img" alt="${i.name}">
                            <div class="flex-grow-1"><div class="fw-semibold">${i.name}</div><div class="text-muted small">Qty: ${i.qty}${i.size?' | Size: '+i.size:''}</div></div>
                            <div class="fw-bold text-primary">₹${(i.price*i.qty).toLocaleString('en-IN')}</div>
                        </div>`).join('')}
                    </div>
                    <hr>
                    <div class="row g-3 small text-muted">
                        <div class="col-md-6"><strong>Payment:</strong> ${order.payment}</div>
                        <div class="col-md-6"><strong>Items:</strong> ${order.items.reduce((s,i)=>s+i.qty,0)}</div>
                    </div>
                    <div class="mt-3 d-flex gap-2 flex-wrap">
                        <button class="btn btn-sm btn-outline-primary" onclick="reorder('${order.id}')"><i class="fas fa-redo me-1"></i>Reorder</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="trackOrder('${order.id}')"><i class="fas fa-map-marker-alt me-1"></i>Track</button>
                        ${order.status === 'Confirmed' ? `<button class="btn btn-sm btn-outline-danger" onclick="cancelOrder('${order.id}')"><i class="fas fa-times me-1"></i>Cancel</button>` : ''}
                    </div>
                </div>
            </div>`).join('');
    }

    function reorder(orderId) {
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        order.items.forEach(i => addToCart(i.id, i.qty, i.size, i.color));
        showToast('Items added to cart!', 'success');
    }

    function trackOrder(orderId) {
        const steps = ['Order Confirmed', 'Processing', 'Shipped', 'Out for Delivery', 'Delivered'];
        const step = steps[Math.floor(Math.random() * 3) + 1];
        showToast(`Order ${orderId}: ${step}`, 'info');
    }

    function cancelOrder(orderId) {
        if (!confirm('Cancel this order?')) return;
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        const order = orders.find(o => o.id === orderId);
        if (order) { order.status = 'Cancelled'; localStorage.setItem('orders', JSON.stringify(orders)); }
        renderOrders();
        showToast('Order cancelled', 'info');
    }

    renderOrders();
</script>
</body>
</html>
