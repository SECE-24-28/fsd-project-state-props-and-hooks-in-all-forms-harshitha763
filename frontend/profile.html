<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - FashionCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-avatar { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:white; margin:0 auto 15px; }
        .stat-card { text-align:center; padding:20px; border-radius:12px; background:white; box-shadow:0 2px 10px rgba(0,0,0,.06); }
        .stat-card i { font-size:2rem; margin-bottom:8px; }
        .tab-btn { border:none; background:none; padding:10px 20px; font-weight:600; color:#999; border-bottom:3px solid transparent; transition:.2s; }
        .tab-btn.active { color:#667eea; border-color:#667eea; }
        .tab-content-pane { display:none; }
        .tab-content-pane.active { display:block; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top px-4">
    <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-shopping-bag"></i> FashionCart</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <div class="ms-auto d-flex gap-2 align-items-center flex-wrap">
            <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="categories.html" class="btn btn-outline-light btn-sm">Categories</a>
            <button class="btn btn-warning btn-sm position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="position-absolute top-0 start-100 translate-middle badge bg-danger" id="cartCount">0</span>
            </button>
            <div class="nav-item dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle"></i> <span id="userDisplay">User</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="wishlist.html"><i class="fas fa-heart me-2"></i>Wishlist</a></li>
                    <li><a class="dropdown-item" href="orders.html"><i class="fas fa-box me-2"></i>Orders</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm p-4 text-center mb-4">
                <div class="profile-avatar" id="avatarEl">U</div>
                <h5 class="fw-bold mb-0" id="profileName">User</h5>
                <p class="text-muted small mb-3" id="profileEmail"></p>
                <span class="badge" style="background:linear-gradient(135deg,#667eea,#764ba2)" id="memberSince">Member</span>
            </div>
            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-6"><div class="stat-card"><i class="fas fa-box text-primary"></i><div class="fw-bold fs-4" id="orderCount">0</div><div class="text-muted small">Orders</div></div></div>
                <div class="col-6"><div class="stat-card"><i class="fas fa-heart text-danger"></i><div class="fw-bold fs-4" id="wishCount">0</div><div class="text-muted small">Wishlist</div></div></div>
            </div>
            <!-- Quick links -->
            <div class="card border-0 shadow-sm">
                <div class="list-group list-group-flush rounded">
                    <a href="orders.html" class="list-group-item list-group-item-action"><i class="fas fa-box me-2 text-primary"></i>My Orders</a>
                    <a href="wishlist.html" class="list-group-item list-group-item-action"><i class="fas fa-heart me-2 text-danger"></i>Wishlist</a>
                    <a href="checkout.html" class="list-group-item list-group-item-action"><i class="fas fa-credit-card me-2 text-success"></i>Checkout</a>
                    <a href="#" class="list-group-item list-group-item-action text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
                </div>
            </div>
        </div>

        <!-- Main -->
        <div class="col-lg-9">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
                    <div class="d-flex gap-0 border-bottom">
                        <button class="tab-btn active" onclick="switchTab('personal',this)">Personal Info</button>
                        <button class="tab-btn" onclick="switchTab('security',this)">Security</button>
                        <button class="tab-btn" onclick="switchTab('address',this)">Address</button>
                    </div>
                </div>
                <div class="card-body p-4">

                    <!-- Personal Info -->
                    <div class="tab-content-pane active" id="tab-personal">
                        <h5 class="fw-bold mb-4">Personal Information</h5>
                        <form onsubmit="saveProfile(event)">
                            <div class="row g-3">
                                <div class="col-md-6"><label class="form-label">First Name</label><input type="text" class="form-control" id="editFname"></div>
                                <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" class="form-control" id="editLname"></div>
                                <div class="col-12"><label class="form-label">Email</label><input type="email" class="form-control" id="editEmail"></div>
                                <div class="col-12"><label class="form-label">Phone</label><input type="tel" class="form-control" id="editPhone"></div>
                                <div class="col-12"><label class="form-label">Gender</label>
                                    <select class="form-select" id="editGender">
                                        <option value="">Prefer not to say</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn mt-4 px-5 fw-bold" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white"><i class="fas fa-save me-2"></i>Save Changes</button>
                        </form>
                    </div>

                    <!-- Security -->
                    <div class="tab-content-pane" id="tab-security">
                        <h5 class="fw-bold mb-4">Change Password</h5>
                        <form onsubmit="changePassword(event)">
                            <div class="mb-3"><label class="form-label">Current Password</label><input type="password" class="form-control" id="currentPwd"></div>
                            <div class="mb-3"><label class="form-label">New Password</label><input type="password" class="form-control" id="newPwd"></div>
                            <div class="mb-3"><label class="form-label">Confirm New Password</label><input type="password" class="form-control" id="confirmPwd"></div>
                            <button type="submit" class="btn mt-2 px-5 fw-bold" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white"><i class="fas fa-lock me-2"></i>Update Password</button>
                        </form>
                    </div>

                    <!-- Address -->
                    <div class="tab-content-pane" id="tab-address">
                        <h5 class="fw-bold mb-4">Saved Address</h5>
                        <form onsubmit="saveAddress(event)">
                            <div class="row g-3">
                                <div class="col-12"><label class="form-label">Address Line 1</label><input type="text" class="form-control" id="addrLine1" placeholder="House/Flat No., Street"></div>
                                <div class="col-12"><label class="form-label">Address Line 2</label><input type="text" class="form-control" id="addrLine2" placeholder="Area, Landmark"></div>
                                <div class="col-md-5"><label class="form-label">City</label><input type="text" class="form-control" id="addrCity"></div>
                                <div class="col-md-4"><label class="form-label">State</label><input type="text" class="form-control" id="addrState"></div>
                                <div class="col-md-3"><label class="form-label">PIN Code</label><input type="text" class="form-control" id="addrPin" maxlength="6"></div>
                            </div>
                            <button type="submit" class="btn mt-4 px-5 fw-bold" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white"><i class="fas fa-save me-2"></i>Save Address</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Cart Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <div id="cartItems" class="flex-grow-1"></div>
        <div class="border-top pt-3 mt-auto">
            <div class="d-flex justify-content-between fw-bold fs-5 mb-3"><span>Total</span><span class="text-primary">₹<span id="cartTotal">0</span></span></div>
            <a href="checkout.html" class="btn btn-success w-100 fw-bold">Checkout</a>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center text-white-50"><p class="mb-0">&copy; 2024 FashionCart. All rights reserved.</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    if (!isLoggedIn()) { window.location.href = 'login.html'; }

    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-content-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        btn.classList.add('active');
    }

    function loadProfile() {
        const u = getCurrentUser();
        const name = `${u.firstName || ''} ${u.lastName || ''}`.trim() || 'User';
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileEmail').textContent = u.email || '';
        document.getElementById('avatarEl').textContent = (u.firstName || 'U')[0].toUpperCase();
        document.getElementById('memberSince').textContent = u.registrationDate ? 'Since ' + u.registrationDate.split(',')[0] : 'Member';

        document.getElementById('editFname').value = u.firstName || '';
        document.getElementById('editLname').value = u.lastName || '';
        document.getElementById('editEmail').value = u.email || '';
        document.getElementById('editPhone').value = u.phone || '';
        if (u.gender) document.getElementById('editGender').value = u.gender;

        if (u.address) {
            document.getElementById('addrLine1').value = u.address.line1 || '';
            document.getElementById('addrLine2').value = u.address.line2 || '';
            document.getElementById('addrCity').value = u.address.city || '';
            document.getElementById('addrState').value = u.address.state || '';
            document.getElementById('addrPin').value = u.address.pin || '';
        }

        document.getElementById('orderCount').textContent = (JSON.parse(localStorage.getItem('orders') || '[]')).length;
        document.getElementById('wishCount').textContent = getWishlist().length;
    }

    function saveProfile(e) {
        e.preventDefault();
        const u = getCurrentUser();
        u.firstName = document.getElementById('editFname').value.trim();
        u.lastName  = document.getElementById('editLname').value.trim();
        u.email     = document.getElementById('editEmail').value.trim();
        u.phone     = document.getElementById('editPhone').value.trim();
        u.gender    = document.getElementById('editGender').value;
        localStorage.setItem('currentUser', JSON.stringify(u));
        // Update in users list too
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const idx = users.findIndex(x => x.email === u.email);
        if (idx > -1) { users[idx] = { ...users[idx], ...u }; localStorage.setItem('users', JSON.stringify(users)); }
        loadProfile();
        showToast('Profile saved!', 'success');
    }

    function changePassword(e) {
        e.preventDefault();
        const current  = document.getElementById('currentPwd').value;
        const newPwd   = document.getElementById('newPwd').value;
        const confirm  = document.getElementById('confirmPwd').value;
        const u = getCurrentUser();
        if (u.password !== current) { showToast('Current password is incorrect', 'danger'); return; }
        if (newPwd !== confirm)      { showToast('Passwords do not match', 'danger'); return; }
        if (newPwd.length < 6)       { showToast('Password must be at least 6 characters', 'danger'); return; }
        u.password = newPwd;
        localStorage.setItem('currentUser', JSON.stringify(u));
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const idx = users.findIndex(x => x.email === u.email);
        if (idx > -1) { users[idx].password = newPwd; localStorage.setItem('users', JSON.stringify(users)); }
        e.target.reset();
        showToast('Password updated!', 'success');
    }

    function saveAddress(e) {
        e.preventDefault();
        const u = getCurrentUser();
        u.address = {
            line1: document.getElementById('addrLine1').value,
            line2: document.getElementById('addrLine2').value,
            city:  document.getElementById('addrCity').value,
            state: document.getElementById('addrState').value,
            pin:   document.getElementById('addrPin').value
        };
        localStorage.setItem('currentUser', JSON.stringify(u));
        showToast('Address saved!', 'success');
    }

    loadProfile();
</script>
</body>
</html>
