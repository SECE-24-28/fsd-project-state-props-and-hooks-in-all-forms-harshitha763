<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FashionCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-card wide" style="max-width:520px">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
    <h2>Create Account</h2>
    <p>Join FashionCart and start shopping</p>
  </div>

  <div class="alert-error"   id="errorBox"><i class="fas fa-times-circle me-2"></i><span id="errorText"></span></div>
  <div class="alert-success" id="successBox"><i class="fas fa-check-circle me-2"></i>Account created! Redirecting…</div>

  <form id="signupForm" novalidate>
    <div class="row g-3 mb-3">
      <div class="col-6">
        <label class="form-label">First Name</label>
        <input type="text" class="form-control" id="fname" placeholder="First name" required>
      </div>
      <div class="col-6">
        <label class="form-label">Last Name</label>
        <input type="text" class="form-control" id="lname" placeholder="Last name" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email Address</label>
      <div class="input-icon-wrap">
        <i class="input-icon fas fa-envelope"></i>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <div class="input-icon-wrap">
        <i class="input-icon fas fa-phone"></i>
        <input type="tel" class="form-control" id="phone" placeholder="+91 00000 00000" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <div class="input-icon-wrap">
        <i class="input-icon fas fa-lock"></i>
        <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required oninput="checkStrength()">
      </div>
      <div class="strength-row mt-2" id="strengthBars">
        <div class="strength-bar" id="bar1"></div>
        <div class="strength-bar" id="bar2"></div>
        <div class="strength-bar" id="bar3"></div>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <div class="input-icon-wrap">
        <i class="input-icon fas fa-lock"></i>
        <input type="password" class="form-control" id="confirm" placeholder="Repeat password" required>
      </div>
    </div>
    <div class="mb-4">
      <label class="check-label" style="font-size:.85rem;color:#555">
        <input type="checkbox" id="agreeTerms" required>
        I agree to the <a href="terms-conditions.html" style="color:var(--primary)">Terms & Conditions</a> and <a href="privacy-policy.html" style="color:var(--primary)">Privacy Policy</a>
      </label>
    </div>
    <button type="submit" class="btn-primary-grad"><i class="fas fa-user-plus me-2"></i>Create Account</button>
  </form>

  <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
  function checkStrength() {
    const pwd = document.getElementById('password').value;
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
    const label = document.getElementById('strengthLabel');
    bars.forEach(b => b.className = 'strength-bar');
    let score = 0;
    if (pwd.length >= 8) score++;
    if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) score++;
    if (/[^A-Za-z0-9]/.test(pwd)) score++;
    const classes = ['weak','medium','strong'];
    const labels  = ['Weak','Fair','Strong'];
    const colors  = ['#ef5350','#ffa726','#66bb6a'];
    for (let i = 0; i < score; i++) bars[i].classList.add(classes[score - 1]);
    label.textContent = score ? labels[score - 1] : '';
    label.style.color = score ? colors[score - 1] : '';
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    document.getElementById('errorText').textContent = msg;
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 5000);
  }

  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const fname    = document.getElementById('fname').value.trim();
    const lname    = document.getElementById('lname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (!document.getElementById('agreeTerms').checked) { showError('Please accept the Terms & Conditions.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirm) { showError('Passwords do not match.'); return; }

    const users = JSON.parse(localStorage.getItem('users') || '[]');
    if (users.some(u => u.email === email)) { showError('This email is already registered. Please log in.'); return; }

    const newUser = { firstName: fname, lastName: lname, email, phone, password, registrationDate: new Date().toLocaleString() };
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('currentUser', JSON.stringify(newUser));
    localStorage.setItem('isLoggedIn', 'true');

    document.getElementById('successBox').style.display = 'block';
    setTimeout(() => location.href = 'index.html', 1500);
  });
</script>
</body>
</html>
