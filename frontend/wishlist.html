<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - FashionCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top px-4">
    <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-shopping-bag"></i> FashionCart</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <div class="ms-auto d-flex gap-2 align-items-center flex-wrap">
            <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
            <a href="categories.html" class="btn btn-outline-light btn-sm">Categories</a>
            <button class="btn btn-warning btn-sm position-relative" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="position-absolute top-0 start-100 translate-middle badge bg-danger" id="cartCount">0</span>
            </button>
            <div class="nav-item dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="fas fa-user-circle"></i> <span id="userDisplay">User</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2"></i>Profile</a></li>
                    <li><a class="dropdown-item" href="wishlist.html"><i class="fas fa-heart me-2"></i>Wishlist</a></li>
                    <li><a class="dropdown-item" href="orders.html"><i class="fas fa-box me-2"></i>Orders</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="fw-bold mb-0"><i class="fas fa-heart me-2 text-danger"></i>My Wishlist</h2>
        <button class="btn btn-outline-danger btn-sm" onclick="clearWishlist()"><i class="fas fa-trash me-1"></i>Clear All</button>
    </div>
    <div class="row g-4" id="wishlistContainer"></div>
</div>

<!-- Cart Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title"><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <div id="cartItems" class="flex-grow-1"></div>
        <div class="border-top pt-3 mt-auto">
            <div class="d-flex justify-content-between fw-bold fs-5 mb-3"><span>Total</span><span class="text-primary">₹<span id="cartTotal">0</span></span></div>
            <a href="checkout.html" class="btn btn-success w-100 fw-bold">Checkout</a>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white">
                <h5 class="modal-title" id="modalProductName"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="row g-4">
                    <div class="col-md-6"><img id="modalProductImage" src="" class="img-fluid rounded-3 w-100" style="max-height:340px;object-fit:cover" alt=""></div>
                    <div class="col-md-6">
                        <p class="text-muted mb-1" id="modalProductCategory"></p>
                        <h4 id="modalProductPrice" class="fw-bold mb-3"></h4>
                        <div class="mb-3"><label class="form-label fw-semibold">Size</label><select class="form-select" id="modalSize"><option value="">Select Size</option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option></select></div>
                        <div class="mb-3"><label class="form-label fw-semibold">Color</label><select class="form-select" id="modalColor"><option value="">Select Color</option><option>Black</option><option>White</option><option>Navy</option><option>Red</option><option>Beige</option></select></div>
                        <div class="mb-3"><label class="form-label fw-semibold">Quantity</label><input type="number" class="form-control" id="quantityInput" value="1" min="1" max="10"></div>
                        <button class="btn w-100 fw-bold" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white" onclick="addToCartFromModal()"><i class="fas fa-cart-plus me-2"></i>Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center text-white-50"><p class="mb-0">&copy; 2024 FashionCart. All rights reserved.</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
    if (!isLoggedIn()) { window.location.href = 'login.html'; }

    function renderWishlist() {
        const wl = getWishlist();
        const container = document.getElementById('wishlistContainer');
        if (!wl.length) {
            container.innerHTML = `<div class="col-12 text-center py-5"><i class="far fa-heart fa-4x text-muted mb-3"></i><h5 class="text-muted">Your wishlist is empty</h5><a href="index.html" class="btn btn-primary mt-3">Explore Products</a></div>`;
            return;
        }
        const items = PRODUCTS.filter(p => wl.includes(p.id));
        container.innerHTML = items.map(p => {
            const discount = Math.round((1 - p.price / p.originalPrice) * 100);
            return `
            <div class="col-6 col-md-4 col-lg-3" id="wl-${p.id}">
                <div class="card product-card shadow-sm h-100 border-0">
                    <div class="position-relative">
                        <img src="${p.image}" class="card-img-top" style="height:220px;object-fit:cover;cursor:pointer" onclick="openProductModal(${p.id})" alt="${p.name}">
                        <span class="badge bg-danger position-absolute top-0 end-0 m-2">-${discount}%</span>
                    </div>
                    <div class="card-body text-center px-2 pb-3">
                        <p class="text-muted small mb-1">${p.category}</p>
                        <h6 class="fw-bold mb-1">${p.name}</h6>
                        <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                            <span class="fw-bold text-primary">₹${p.price.toLocaleString('en-IN')}</span>
                            <span class="text-muted text-decoration-line-through small">₹${p.originalPrice.toLocaleString('en-IN')}</span>
                        </div>
                        <div class="d-flex gap-1">
                            <button class="btn btn-dark btn-sm flex-grow-1" onclick="addToCart(${p.id})"><i class="fas fa-cart-plus"></i> Add</button>
                            <button class="btn btn-outline-danger btn-sm" onclick="removeWishItem(${p.id})"><i class="fas fa-heart-broken"></i></button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function removeWishItem(id) {
        const wl = getWishlist().filter(x => x !== id);
        localStorage.setItem('wishlist', JSON.stringify(wl));
        renderWishlist();
        showToast('Removed from wishlist', 'info');
    }

    function clearWishlist() {
        if (!confirm('Clear all items from wishlist?')) return;
        localStorage.removeItem('wishlist');
        renderWishlist();
        showToast('Wishlist cleared', 'info');
    }

    renderWishlist();
</script>
</body>
</html>
