<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FashionCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
    <h2>FashionCart</h2>
    <p>Welcome back! Sign in to your account</p>
  </div>
  <div class="alert-error" id="errorBox"><i class="fas fa-exclamation-circle me-2"></i><span id="errorText"></span></div>
  <form id="loginForm" novalidate>
    <div class="mb-3"><label class="form-label">Email Address</label><div class="input-icon-wrap"><i class="input-icon fas fa-envelope"></i><input type="email" class="form-control" id="email" placeholder="you@example.com" required></div></div>
    <div class="mb-3"><label class="form-label">Password</label><div class="input-icon-wrap"><i class="input-icon fas fa-lock"></i><input type="password" class="form-control" id="password" placeholder="Your password" required></div></div>
    <div class="remember-row mb-4">
      <label class="check-label"><input type="checkbox" id="rememberMe"> Remember me</label>
      <a href="forgot-password.html">Forgot password?</a>
    </div>
    <button type="submit" class="btn-primary-grad" id="loginBtn"><i class="fas fa-sign-in-alt me-2"></i>Sign In</button>
  </form>
  <div class="divider"><span>or</span></div>
  <div class="auth-footer">Don't have an account? <a href="signup.html">Create one free</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="api.js"></script>
<script>
  if (isLoggedIn()) location.href = 'index.html';
  const rem = localStorage.getItem('fc_remembered');
  if (rem) { document.getElementById('email').value = rem; document.getElementById('rememberMe').checked = true; }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in…';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('rememberMe').checked;
    try {
      await apiLogin(email, password);
      if (remember) localStorage.setItem('fc_remembered', email);
      else localStorage.removeItem('fc_remembered');
      location.href = 'index.html';
    } catch(err) {
      const box = document.getElementById('errorBox');
      document.getElementById('errorText').textContent = err.message;
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 5000);
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
    }
  });
</script>
</body>
</html>
