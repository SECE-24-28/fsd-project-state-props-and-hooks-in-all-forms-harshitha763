<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — FashionCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-lock"></i></div>
    <h2>Reset Password</h2>
    <p>Enter your email and we'll send a reset link</p>
  </div>

  <div class="info-notice"><i class="fas fa-info-circle me-2" style="color:var(--primary)"></i>We'll check if this email is registered in our system.</div>

  <div class="alert-error"   id="errorBox"><i class="fas fa-times-circle me-2"></i><span id="errorText"></span></div>
  <div class="alert-success" id="successBox"><i class="fas fa-check-circle me-2"></i>Reset instructions sent! Redirecting to login…</div>

  <form id="forgotForm" novalidate>
    <div class="mb-4">
      <label class="form-label">Email Address</label>
      <div class="input-icon-wrap">
        <i class="input-icon fas fa-envelope"></i>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
      </div>
    </div>
    <button type="submit" class="btn-primary-grad"><i class="fas fa-paper-plane me-2"></i>Send Reset Link</button>
  </form>

  <div class="auth-footer" style="margin-top:20px"><a href="login.html"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></div>
</div>

<script>
  document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    const exists = users.some(u => u.email === email);

    if (exists) {
      document.getElementById('successBox').style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
      setTimeout(() => location.href = 'login.html', 2500);
    } else {
      const b = document.getElementById('errorBox');
      document.getElementById('errorText').textContent = 'No account found with this email. Please sign up.';
      b.style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
    }
  });
</script>
</body>
</html>
