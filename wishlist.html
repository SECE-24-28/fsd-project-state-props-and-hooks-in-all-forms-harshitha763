<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist — FashionCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body{background:var(--bg)}
    .wl-card{background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(44,56,48,.07);transition:all .3s;border:1px solid var(--border)}
    .wl-card:hover{transform:translateY(-6px);box-shadow:0 14px 36px rgba(44,56,48,.13)}
    .wl-img-wrap{overflow:hidden;height:240px;position:relative}
    .wl-img-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform .5s}
    .wl-card:hover .wl-img-wrap img{transform:scale(1.08)}
    .disc-badge{position:absolute;top:12px;right:12px;background:var(--dark);color:white;padding:4px 10px;border-radius:50px;font-size:.7rem;font-weight:700}
    .bdg-tag{position:absolute;top:12px;left:12px;background:var(--gradient);color:white;padding:4px 10px;border-radius:50px;font-size:.7rem;font-weight:700}
    .wl-body{padding:14px 16px 16px}
    .wl-cat{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .wl-name{font-weight:700;font-size:.93rem;color:var(--dark);cursor:pointer}
    .wl-name:hover{color:var(--primary)}
    .price-new{font-weight:800;color:var(--primary);font-size:1rem}
    .price-old{font-size:.78rem;color:#bbb;text-decoration:line-through;margin-left:6px}
    .btn-add{background:var(--dark);color:white;border:none;border-radius:10px;padding:9px;width:100%;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Poppins',sans-serif}
    .btn-add:hover{background:var(--gradient)}
    .btn-rem{background:none;border:1.5px solid var(--primary);color:var(--primary);border-radius:10px;padding:9px 14px;font-size:.85rem;cursor:pointer;transition:all .3s}
    .btn-rem:hover{background:var(--primary);color:white}
    .empty-state{text-align:center;padding:80px 20px}
    .spinner-wrap{text-align:center;padding:60px;color:var(--muted)}
  </style>
</head>
<body>
<nav class="top-navbar navbar px-3 px-lg-5">
  <a class="nav-brand" href="index.html"><i class="fas fa-shopping-bag me-2"></i>FashionCart</a>
  <div class="d-flex align-items-center gap-2">
    <a href="index.html" class="nav-icon-btn">Home</a>
    <button class="nav-icon-btn cart-btn" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas"><i class="fas fa-shopping-cart"></i> Cart <span class="badge bg-dark ms-1" id="cartCount">0</span></button>
    <div class="dropdown"><button class="nav-icon-btn dropdown-toggle" data-bs-toggle="dropdown"><i class="fas fa-user-circle"></i> <span id="userDisplay">User</span></button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="profile.html"><i class="fas fa-user me-2" style="color:var(--primary)"></i>Profile</a></li>
        <li><a class="dropdown-item" href="orders.html"><i class="fas fa-box me-2" style="color:var(--primary)"></i>Orders</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h3 class="fw-bold mb-0"><i class="fas fa-heart me-2 text-danger"></i>My Wishlist <span class="text-muted fs-6 fw-normal" id="wlCount"></span></h3>
    <button class="btn btn-outline-danger btn-sm" onclick="clearWishlist()"><i class="fas fa-trash me-1"></i>Clear All</button>
  </div>
  <div id="wlWrap"><div class="spinner-wrap"><i class="fas fa-spinner fa-spin fa-2x mb-3 d-block" style="color:var(--primary)"></i>Loading wishlist…</div></div>
</div>

<div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
  <div class="offcanvas-header"><h5 class="offcanvas-title text-white"><i class="fas fa-shopping-cart me-2"></i>Cart</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
  <div class="offcanvas-body d-flex flex-column"><div id="cartItems" class="flex-grow-1"></div><div class="border-top pt-3 mt-auto"><div class="d-flex justify-content-between fw-bold fs-5 mb-3"><span>Total</span><span style="color:var(--primary)">₹<span id="cartTotal">0</span></span></div><a href="checkout.html" class="btn w-100 fw-bold mb-2 text-white" style="background:var(--dark)">Checkout</a><button class="btn btn-outline-secondary w-100" onclick="clearCart()">Clear Cart</button></div></div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title text-white" id="modalProductName"></h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
  <div class="modal-body"><div class="row g-4"><div class="col-md-6"><img id="modalProductImage" src="" class="img-fluid rounded-3 w-100" style="height:340px;object-fit:cover" alt=""></div>
  <div class="col-md-6"><p class="text-muted mb-1" id="modalProductCategory"></p><h4 id="modalProductPrice" class="fw-bold mb-3"></h4>
  <div class="mb-3"><label class="form-label fw-semibold">Size</label><select class="form-select" id="modalSize"><option value="">Select Size</option><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option></select></div>
  <div class="mb-3"><label class="form-label fw-semibold">Color</label><select class="form-select" id="modalColor"><option value="">Select Color</option><option>Black</option><option>White</option><option>Olive</option><option>Beige</option><option>Sage Green</option></select></div>
  <div class="mb-3"><label class="form-label fw-semibold">Quantity</label><input type="number" class="form-control" id="quantityInput" value="1" min="1" max="10"></div>
  <button class="btn w-100 fw-bold text-white" style="background:var(--gradient);border:none;padding:12px;border-radius:10px" onclick="addToCartFromModal()"><i class="fas fa-cart-plus me-2"></i>Add to Cart</button>
  </div></div></div></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script><script src="api.js"></script>
<script>
  if (!isLoggedIn()) location.href = 'login.html';

  async function renderWishlist() {
    const wrap = document.getElementById('wlWrap');
    try {
      const items = await api('GET', '/wishlist');
      const count = document.getElementById('wlCount');
      if (count) count.textContent = items.length ? '(' + items.length + ')' : '';
      if (!items.length) {
        wrap.innerHTML = '<div class="empty-state"><i class="far fa-heart fa-4x mb-3 d-block" style="color:var(--border)"></i><h5 class="text-muted">Your wishlist is empty</h5><p class="text-muted">Browse products and click ♡ to save them here.</p><a href="index.html" class="btn text-white mt-3 fw-bold px-4" style="background:var(--gradient);border:none">Explore Products</a></div>';
        return;
      }
      wrap.innerHTML = '<div class="row g-4">' + items.map(p => {
        const pid = String(p._id || p.id);
        const discount = Math.round((1 - p.price / p.original_price) * 100);
        return '<div class="col-6 col-md-4 col-lg-3" id="wl-' + pid + '"><div class="wl-card">' +
          '<div class="wl-img-wrap"><img src="' + p.image + '" onclick="openProductModal(\'' + pid + '\')" alt="' + p.name + '">' +
          (p.badge ? '<span class="bdg-tag">' + p.badge + '</span>' : '') +
          '<span class="disc-badge">-' + discount + '%</span></div>' +
          '<div class="wl-body"><p class="wl-cat mb-1">' + p.category + '</p>' +
          '<h6 class="wl-name mb-1" onclick="openProductModal(\'' + pid + '\')">' + p.name + '</h6>' +
          '<div class="mb-3"><span class="price-new">₹' + p.price.toLocaleString('en-IN') + '</span><span class="price-old">₹' + p.original_price.toLocaleString('en-IN') + '</span></div>' +
          '<div class="d-flex gap-2">' +
          '<button class="btn-add flex-grow-1" onclick="addToCart(\'' + pid + '\')"><i class="fas fa-cart-plus me-1"></i>Add to Cart</button>' +
          '<button class="btn-rem" onclick="removeWL(\'' + pid + '\')"><i class="fas fa-heart-broken"></i></button>' +
          '</div></div></div></div>';
      }).join('') + '</div>';
    } catch(e) {
      wrap.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle fa-3x mb-3 d-block" style="color:var(--primary)"></i><h5 class="text-muted">Could not load wishlist</h5><p class="text-muted">' + e.message + '</p></div>';
    }
  }

  async function removeWL(productId) {
    try {
      await api('POST', '/wishlist', {productId});
      const card = document.getElementById('wl-' + productId);
      if (card) card.remove();
      showToast('Removed from wishlist','info');
      const remaining = document.querySelectorAll('[id^="wl-"]').length;
      const count = document.getElementById('wlCount');
      if (count) count.textContent = remaining ? '(' + remaining + ')' : '';
      if (!remaining) renderWishlist();
    } catch(e) { showToast(e.message,'danger'); }
  }

  async function clearWishlist() {
    if (!confirm('Clear all items from your wishlist?')) return;
    try { await api('DELETE', '/wishlist'); showToast('Wishlist cleared','info'); renderWishlist(); } catch(e) { showToast(e.message,'danger'); }
  }

  renderWishlist();
</script>
</body>
</html>
