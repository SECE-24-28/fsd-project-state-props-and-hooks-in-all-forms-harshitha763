<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — FashionCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
<script src="config.js"></script></head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-key"></i></div>
    <h2>Reset Password</h2>
    <p>Enter your email and we'll send a reset link</p>
  </div>
  <div class="info-notice"><i class="fas fa-info-circle me-2"></i>We'll check if this email is registered in our system.</div>
  <div class="alert-error"   id="errorBox"  ><i class="fas fa-times-circle me-2"></i><span id="errorText"></span></div>
  <div class="alert-success" id="successBox"><i class="fas fa-check-circle me-2"></i>If this email is registered, a reset link has been sent. Redirecting to login…</div>
  <form id="forgotForm" novalidate>
    <div class="mb-4">
      <label class="form-label">Email Address</label>
      <div class="input-icon-wrap"><i class="input-icon fas fa-envelope"></i><input type="email" class="form-control" id="email" placeholder="you@example.com" required></div>
    </div>
    <button type="submit" class="btn-primary-grad" id="resetBtn"><i class="fas fa-paper-plane me-2"></i>Send Reset Link</button>
  </form>
  <div class="auth-footer mt-4"><a href="login.html"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></div>
</div>
<script>
  const _API=window._BACKEND_URL?window._BACKEND_URL+'/api':(location.hostname==='localhost'||location.hostname==='127.0.0.1'?'http://localhost:3000/api':'/api');
  document.getElementById('forgotForm').addEventListener('submit',async function(e){
    e.preventDefault();
    const btn=document.getElementById('resetBtn');
    const email=document.getElementById('email').value.trim();
    if(!email)return;
    btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin me-2"></i>Checking…';
    try{
      const res=await fetch(_API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:'___check___'})});
      const data=await res.json();
      const notFound=data.error&&(data.error.toLowerCase().includes('not found')||data.error.toLowerCase().includes('invalid email'));
      if(res.status===404||notFound){
        document.getElementById('errorText').textContent='No account found with this email.';
        document.getElementById('errorBox').style.display='block';
        document.getElementById('successBox').style.display='none';
      }else{
        document.getElementById('successBox').style.display='block';
        document.getElementById('errorBox').style.display='none';
        setTimeout(()=>location.href='login.html',2500);
      }
    }catch(err){
      document.getElementById('successBox').style.display='block';
      document.getElementById('errorBox').style.display='none';
      setTimeout(()=>location.href='login.html',2500);
    }
    btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane me-2"></i>Send Reset Link';
  });
</script>
</body>
</html>
