<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FashionCart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
<script src="config.js"></script></head>
<body class="auth-page">
<div class="auth-card" style="max-width:520px">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
    <h2>Create Account</h2>
    <p>Join FashionCart and start shopping</p>
  </div>
  <div class="alert-error"   id="errorBox"  ><i class="fas fa-times-circle me-2"></i><span id="errorText"></span></div>
  <div class="alert-success" id="successBox"><i class="fas fa-check-circle me-2"></i>Account created! Redirecting…</div>
  <form id="signupForm" novalidate>
    <div class="row g-3 mb-3">
      <div class="col-6"><label class="form-label">First Name</label><input type="text" class="form-control" id="fname" placeholder="First name" required></div>
      <div class="col-6"><label class="form-label">Last Name</label><input type="text"  class="form-control" id="lname" placeholder="Last name"  required></div>
    </div>
    <div class="mb-3"><label class="form-label">Email Address</label><div class="input-icon-wrap"><i class="input-icon fas fa-envelope"></i><input type="email" class="form-control" id="email" placeholder="you@example.com" required></div></div>
    <div class="mb-3"><label class="form-label">Phone Number</label><div class="input-icon-wrap"><i class="input-icon fas fa-phone"></i><input type="tel" class="form-control" id="phone" placeholder="+91 00000 00000"></div></div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <div class="input-icon-wrap"><i class="input-icon fas fa-lock"></i><input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required oninput="checkStr()"></div>
      <div class="strength-row mt-2" id="sBars"><div class="strength-bar" id="b1"></div><div class="strength-bar" id="b2"></div><div class="strength-bar" id="b3"></div></div>
      <div class="strength-label" id="sLbl"></div>
    </div>
    <div class="mb-3"><label class="form-label">Confirm Password</label><div class="input-icon-wrap"><i class="input-icon fas fa-lock"></i><input type="password" class="form-control" id="confirm" placeholder="Repeat password" required></div></div>
    <div class="mb-4"><label class="check-label" style="font-size:.85rem;color:var(--muted)"><input type="checkbox" id="agree" required> I agree to the <a href="terms-conditions.html">Terms</a> and <a href="privacy-policy.html">Privacy Policy</a></label></div>
    <button type="submit" class="btn-primary-grad" id="signupBtn"><i class="fas fa-user-plus me-2"></i>Create Account</button>
  </form>
  <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
</div>
<script>
  const _API=window._BACKEND_URL?window._BACKEND_URL+'/api':(location.hostname==='localhost'||location.hostname==='127.0.0.1'?'http://localhost:3000/api':'/api');
  if(localStorage.getItem('token'))location.href='index.html';
  function checkStr(){
    const p=document.getElementById('password').value;
    const bars=[document.getElementById('b1'),document.getElementById('b2'),document.getElementById('b3')];
    const lbl=document.getElementById('sLbl');
    bars.forEach(b=>b.className='strength-bar');
    let s=0;if(p.length>=6)s++;if(/[A-Z]/.test(p)&&/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
    const cls=['weak','medium','strong'],labels=['Weak','Fair','Strong'],cols=['#c97b7b','#b5a45a','#4a7c59'];
    for(let i=0;i<s;i++)bars[i].classList.add(cls[s-1]);
    lbl.textContent=s?labels[s-1]:'';lbl.style.color=s?cols[s-1]:'';
  }
  function showErr(m){const b=document.getElementById('errorBox');document.getElementById('errorText').textContent=m;b.style.display='block';setTimeout(()=>b.style.display='none',5000);}
  document.getElementById('signupForm').addEventListener('submit',async function(e){
    e.preventDefault();
    const fname=document.getElementById('fname').value.trim();
    const lname=document.getElementById('lname').value.trim();
    const email=document.getElementById('email').value.trim();
    const phone=document.getElementById('phone').value.trim();
    const password=document.getElementById('password').value;
    const confirm=document.getElementById('confirm').value;
    if(!document.getElementById('agree').checked){showErr('Please accept the Terms & Conditions.');return;}
    if(!fname||!lname){showErr('Please enter your full name.');return;}
    if(password.length<6){showErr('Password must be at least 6 characters.');return;}
    if(password!==confirm){showErr('Passwords do not match.');return;}
    const btn=document.getElementById('signupBtn');
    btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin me-2"></i>Creating…';
    try{
      const res=await fetch(_API+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({firstName:fname,lastName:lname,email,phone,password})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||'Registration failed');
      localStorage.setItem('token',data.token);localStorage.setItem('currentUser',JSON.stringify(data.user));
      document.getElementById('successBox').style.display='block';
      setTimeout(()=>location.href='index.html',1500);
    }catch(err){showErr(err.message);btn.disabled=false;btn.innerHTML='<i class="fas fa-user-plus me-2"></i>Create Account';}
  });
</script>
</body>
</html>
